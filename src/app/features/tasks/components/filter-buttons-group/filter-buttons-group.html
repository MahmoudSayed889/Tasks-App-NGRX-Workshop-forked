<div class="flex gap-2 mb-6">
  @for (item of filters; track $index) {
    <button
      class="px-3 py-1 text-sm rounded-full border transition-all duration-200 hover:bg-gray-100 hover:shadow-sm capitalize"
      (click)="setFilter(item)"
    >
      {{item}}
    </button>
  }
