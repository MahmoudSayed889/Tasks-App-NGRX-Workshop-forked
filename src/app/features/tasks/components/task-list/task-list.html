<div class="mt-4 space-y-3">
  @if ((tasks$ | async)?.length) {
    @for (task of tasks$ | async; track task._id) {
      <app-task-card [task]="task" (onToggle)="onToggleTask($event)" />
    }
  } @else {
    <div class="flex flex-col items-center justify-center py-10 text-gray-400">
      <i class="pi pi-inbox text-3xl mb-2"></i>
      <span class="text-sm font-medium">No tasks found</span>
      <span class="text-xs text-gray-400 mt-1"> Create your first task to get started </span>
    </div>
  }
</div>
